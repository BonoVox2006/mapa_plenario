[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/deputados"
  to = "/.netlify/functions/deputados"
  status = 200

[[redirects]]
  from = "/api/liderancas"
  to = "/.netlify/functions/liderancas"
  status = 200

[[redirects]]
  from = "/api/liderancas-sync"
  to = "/.netlify/functions/liderancas-sync"
  status = 200

# Agendamento (Netlify Scheduled Functions). Se o deploy acusar erro, remova este bloco.
[functions.liderancas-sync]
  schedule = "0 */2 * * *"
