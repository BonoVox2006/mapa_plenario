[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/deputados"
  to = "/.netlify/functions/deputados"
  status = 200

[[redirects]]
  from = "/api/liderancas"
  to = "/.netlify/functions/liderancas"
  status = 200

[[redirects]]
  from = "/api/liderancas-sync"
  to = "/.netlify/functions/liderancas-sync"
  status = 200

# Cron Netlify = UTC. Com Brasília em UTC−3, 8h–19h local ≈ 11h–22h UTC (ajuste se o fuso mudar).
# Seg–sex apenas; fim de semana não agenda. Feriados: tratados na function (Brasil API + America/Sao_Paulo).
[functions.liderancas-sync]
  schedule = "0 11-22 * * 1-5"
